name: Publish Kore.kt

on:
  push:
    workflow_dispatch:
    tags:
      - v.*

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '26'

      - name: Grant execute permission for Gradle
        run: chmod +x gradlew
      - name: Build Kore.kt
        run: ./gradlew :Kore.kt:publish -DREPOSILITE_USER=${{ secrets.REPOSILITE_USER }} -DREPOSILITE_TOKEN=${{ secrets.REPOSILITE_TOKEN }}
